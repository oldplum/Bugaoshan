name: Build Windows

on:
  workflow_call:
    inputs:
      version:
        description: "tag name"
        required: false
        type: string

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags --force
        shell: bash

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set up Python 3
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Extract git metadata
        id: git_meta
        run: python .github/scripts/git_meta.py
        env:
          VERSION: ${{ inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Windows
        run: |
          flutter build windows --release \
            --dart-define=GIT_TAG=${{ steps.git_meta.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.git_meta.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.git_meta.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.git_meta.outputs.BUILD_TIME }}
        shell: bash

      - name: Archive Windows Release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath
          windows-release.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip
