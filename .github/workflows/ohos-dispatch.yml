name: Trigger HarmonyOS Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit to build
        required: true
        default: main
        type: string
      version:
        description: Release tag or artifact suffix
        required: false
        default: ""
        type: string
      publish_release:
        description: Create a GitHub Release in TEMP-HOMO
        required: true
        default: false
        type: boolean

jobs:
  dispatch-temp-homo:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve dispatch payload
        id: ctx
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            SOURCE_REF="${GITHUB_REF_NAME}"
            VERSION="${GITHUB_REF_NAME}"
            PUBLISH=true
          else
            SOURCE_REF='${{ inputs.source_ref }}'
            VERSION='${{ inputs.version }}'
            PUBLISH='${{ inputs.publish_release }}'

            if [[ -z "${VERSION}" ]]; then
              SAFE_REF="${SOURCE_REF//\//-}"
              VERSION="manual-${SAFE_REF}-${GITHUB_RUN_NUMBER}"
            fi
          fi

          echo "source_ref=${SOURCE_REF}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${PUBLISH}" >> "${GITHUB_OUTPUT}"

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.source_ref }}
          fetch-depth: 1

      - name: Resolve source sha
        id: sha
        run: |
          echo "source_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Dispatch TEMP-HOMO
        env:
          TEMP_HOMO_PAT: ${{ secrets.TEMP_HOMO_PAT }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_REF: ${{ steps.ctx.outputs.source_ref }}
          SOURCE_SHA: ${{ steps.sha.outputs.source_sha }}
          VERSION: ${{ steps.ctx.outputs.version }}
          PUBLISH_RELEASE: ${{ steps.ctx.outputs.publish_release }}
        run: |
          if [[ -z "${TEMP_HOMO_PAT}" ]]; then
            echo "TEMP_HOMO_PAT is required" >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "event_type": "build-ohos",
              "client_payload": {
                  "source_repo": os.environ["SOURCE_REPO"],
                  "source_ref": os.environ["SOURCE_REF"],
                  "source_sha": os.environ["SOURCE_SHA"],
                  "version": os.environ["VERSION"],
                  "publish_release": os.environ["PUBLISH_RELEASE"].lower() == "true",
              },
          }

          req = urllib.request.Request(
              "https://api.github.com/repos/assumeengagetry/TEMP-HOMO/dispatches",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['TEMP_HOMO_PAT']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          with urllib.request.urlopen(req) as resp:
              print(f"repository_dispatch -> HTTP {resp.status}")
          PY
