name: Build Linux

on:
  workflow_call:
    inputs:
      version:
        description: "tag name"
        required: false
        type: string

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
          key: linux-apt-${{ runner.os }}-${{ hashFiles('.github/workflows/build-linux.yml') }}
          restore-keys: |
            linux-apt-${{ runner.os }}-

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: linux-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            linux-pub-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libsecret-1-dev libepoxy-dev libwayland-dev \
            libwpewebkit-2.0-dev

      - name: Setup build environment
        id: setup
        uses: ./.github/actions/setup
        with:
          version: ${{ inputs.version }}

      - name: Build Linux
        run: |
          flutter build linux --release \
            --dart-define=GIT_TAG=${{ steps.setup.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.setup.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.setup.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.setup.outputs.BUILD_TIME }}

      - name: Archive Linux Release
        run: tar -czvf linux-release.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux-release.tar.gz
