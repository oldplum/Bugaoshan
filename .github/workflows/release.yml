name: Build App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "tag name"
        required: false
        type: string

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags --force

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set up Python 3
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Extract git metadata
        id: git_meta
        run: python .github/scripts/git_meta.py
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Decode Keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}' > android/key.properties
          echo 'keyPassword=${{ secrets.KEY_PASSWORD }}' >> android/key.properties
          echo 'keyAlias=${{ secrets.KEY_ALIAS }}' >> android/key.properties
          echo 'storeFile=../keystore/upload-keystore.jks' >> android/key.properties

      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=GIT_TAG=${{ steps.git_meta.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.git_meta.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.git_meta.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.git_meta.outputs.BUILD_TIME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags --force
        shell: bash

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set up Python 3
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Extract git metadata
        id: git_meta
        run: python .github/scripts/git_meta.py
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Windows
        run: |
          flutter build windows --release \
            --dart-define=GIT_TAG=${{ steps.git_meta.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.git_meta.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.git_meta.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.git_meta.outputs.BUILD_TIME }}
        shell: bash

      - name: Archive Windows Release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath
          windows-release.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set up Python 3
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Extract git metadata
        id: git_meta
        run: python .github/scripts/git_meta.py
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Linux
        run: |
          flutter build linux --release \
            --dart-define=GIT_TAG=${{ steps.git_meta.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.git_meta.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.git_meta.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.git_meta.outputs.BUILD_TIME }}

      - name: Archive Linux Release
        run: tar -czvf linux-release.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux-release.tar.gz

  release:
    name: Release
    needs: [ build-android, build-windows, build-linux ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name ==
      'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-release

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: linux-release

      - name: Set up Python 3
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Get version and tags
        id: vars
        run: python .github/scripts/release_tags.py
        env:
          VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Extract changelog
        id: changelog
        run: python .github/scripts/release_changelog.py
        env:
          VERSION: ${{ steps.vars.outputs.tag }}

      - name: Build release body
        id: release_body
        run: python .github/scripts/release_body.py
        env:
          VERSION: ${{ steps.vars.outputs.tag }}
          REPO: https://github.com/${{ github.repository }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          PREV: ${{ steps.vars.outputs.prev }}

      - name: Prepare release files
        run: python .github/scripts/release_prepare.py
        env:
          VERSION: ${{ steps.vars.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          body: ${{ steps.release_body.outputs.body }}
          files: |
            bugaoshan_*.apk
            bugaoshan_*.zip
            bugaoshan_*.tar.gz
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-') }}
          generate_release_notes: false
