name: Build App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "tag name"
        required: false
        type: string

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Extract git metadata
        id: git_meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == refs/heads/* ]]; then TAG=""; fi
          echo "GIT_TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT_DATE=$(git log -1 --format="%ci")" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%S%z")" >> $GITHUB_OUTPUT

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Decode Keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}' > android/key.properties
          echo 'keyPassword=${{ secrets.KEY_PASSWORD }}' >> android/key.properties
          echo 'keyAlias=${{ secrets.KEY_ALIAS }}' >> android/key.properties
          echo 'storeFile=../keystore/upload-keystore.jks' >> android/key.properties

      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=GIT_TAG=${{ steps.git_meta.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.git_meta.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.git_meta.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.git_meta.outputs.BUILD_TIME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Extract git metadata
        id: git_meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == refs/heads/* ]]; then TAG=""; fi
          echo "GIT_TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT_DATE=$(git log -1 --format="%ci")" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%S%z")" >> $GITHUB_OUTPUT

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Windows
        run: |
          flutter build windows --release \
            --dart-define=GIT_TAG=${{ steps.git_meta.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.git_meta.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.git_meta.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.git_meta.outputs.BUILD_TIME }}

      - name: Archive Windows Release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-release.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Extract git metadata
        id: git_meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == refs/heads/* ]]; then TAG=""; fi
          echo "GIT_TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT_DATE=$(git log -1 --format="%ci")" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%S%z")" >> $GITHUB_OUTPUT

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Linux
        run: |
          flutter build linux --release \
            --dart-define=GIT_TAG=${{ steps.git_meta.outputs.GIT_TAG }} \
            --dart-define=GIT_COMMIT=${{ steps.git_meta.outputs.GIT_COMMIT }} \
            --dart-define=GIT_COMMIT_DATE=${{ steps.git_meta.outputs.GIT_COMMIT_DATE }} \
            --dart-define=BUILD_TIME=${{ steps.git_meta.outputs.BUILD_TIME }}

      - name: Archive Linux Release
        run: tar -czvf linux-release.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux-release.tar.gz

  release:
    name: Release
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-release

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: linux-release

      - name: Get version and tags
        id: vars
        run: |
          CURRENT_TAG="${{ github.event.inputs.version }}"
          if [ -z "$CURRENT_TAG" ]; then
            CURRENT_TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"

          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${CURRENT_TAG}$" \
            | head -n 1 || true)

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "range=${PREV_TAG}..HEAD" >> "$GITHUB_OUTPUT"
            echo "prev=${PREV_TAG:0:7} (initial commit)" >> "$GITHUB_OUTPUT"
          else
            echo "range=${PREV_TAG}..HEAD" >> "$GITHUB_OUTPUT"
            echo "prev=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        id: changelog
        run: |
          python3 - <<'PYEOF'
          import os, re

          version = os.environ.get('VERSION', '').lstrip('v')

          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()

          lines = content.split('\n')
          start_idx = -1
          end_idx = len(lines)

          pattern = rf'^##\s*\[?{re.escape(version)}\]?(?:\s*-\s*\d{{4}}-\d{{2}}-\d{{2}})?\s*$'

          for i, line in enumerate(lines):
              if re.match(pattern, line.strip(), re.IGNORECASE):
                  start_idx = i
                  break

          if start_idx == -1:
              changelog = "*No changelog entry for this version.*"
          else:
              for i in range(start_idx + 1, len(lines)):
                  if re.match(r'^##\s', lines[i].strip()):
                      end_idx = i
                      break

              changelog_lines = lines[start_idx + 1:end_idx]
              while changelog_lines and changelog_lines[0].strip() == '':
                  changelog_lines.pop(0)
              while changelog_lines and changelog_lines[-1].strip() == '':
                  changelog_lines.pop()

              changelog = '\n'.join(changelog_lines) if changelog_lines else "*No changelog entry for this version.*"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("changelog<<CHANGELOG_EOF\n")
              f.write(changelog + "\n")
              f.write("CHANGELOG_EOF\n")
          PYEOF
        env:
          VERSION: ${{ steps.vars.outputs.tag }}

      - name: Build release body
        id: release_body
        run: |
          VERSION="${{ steps.vars.outputs.tag }}"
          REPO="https://github.com/${{ github.repository }}"

          {
            echo "body<<EOF"
            echo "## ⬇️ 下载 (Downloads)"
            echo "- Android: [64位]($REPO/releases/download/$VERSION/bugaoshan_${VERSION}_arm64-v8a.apk)"
            echo "- Windows: [x64 Zip]($REPO/releases/download/$VERSION/bugaoshan_${VERSION}_windows_x64.zip)"
            echo "- Linux: [x64 Tar.gz]($REPO/releases/download/$VERSION/bugaoshan_${VERSION}_linux_x64.tar.gz)"
            echo ""
            echo "> 💡 **Note**: 当前项目优先保障 Android 端的稳定与体验。Windows 和 Linux 版本可能存在部分兼容性或体验问题。"
            echo ""
            echo "${{ steps.changelog.outputs.changelog }}"
            echo ""
            echo "**Full diff:** $REPO/compare/${{ steps.vars.outputs.prev }}...${{ steps.vars.outputs.tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        run: |
          VERSION="${{ steps.vars.outputs.tag }}"
          for file in android-apk/*.apk; do
            filename=$(basename -- "$file")
            arch=$(echo $filename | sed 's/app-//' | sed 's/-release.apk//')
            cp "$file" "bugaoshan_${VERSION}_${arch}.apk"
          done
          cp windows-release/windows-release.zip "bugaoshan_${VERSION}_windows_x64.zip"
          cp linux-release/linux-release.tar.gz "bugaoshan_${VERSION}_linux_x64.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          body: ${{ steps.release_body.outputs.body }}
          files: |
            bugaoshan_*.apk
            bugaoshan_*.zip
            bugaoshan_*.tar.gz
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-') }}
          generate_release_notes: false
