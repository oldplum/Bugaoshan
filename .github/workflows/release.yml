name: Build App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "tag name"
        required: false
        type: string

jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Decode Keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}' > android/key.properties
          echo 'keyPassword=${{ secrets.KEY_PASSWORD }}' >> android/key.properties
          echo 'keyAlias=${{ secrets.KEY_ALIAS }}' >> android/key.properties
          echo 'storeFile=../keystore/upload-keystore.jks' >> android/key.properties

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows Release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath
          windows-release.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux Release
        run: tar -czvf linux-release.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux-release.tar.gz

  release:
    name: Release
    needs: [ build-android, build-windows, build-linux ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name ==
      'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-release

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: linux-release

      - name: Get version and tags
        id: vars
        run: |
          CURRENT_TAG="${{ github.event.inputs.version }}"
          if [ -z "$CURRENT_TAG" ]; then
            CURRENT_TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"

          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${CURRENT_TAG}$" \
            | head -n 1 || true)

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "range=${PREV_TAG}..HEAD" >> "$GITHUB_OUTPUT"
            echo "prev=${PREV_TAG:0:7} (initial commit)" >> "$GITHUB_OUTPUT"
          else
            echo "range=${PREV_TAG}..HEAD" >> "$GITHUB_OUTPUT"
            echo "prev=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog with AI
        id: changelog
        run: |
          COMMITS=$(git log "${{ steps.vars.outputs.range }}" --pretty="%h %s" 2>/dev/null || echo "No commits found")

          python3 - <<'PYEOF'
          import os, json, urllib.request, sys

          commits = os.environ.get('COMMITS', '')
          version = os.environ.get('VERSION', '')
          prev = os.environ.get('PREV', '')

          prompt = f"""你是一个专业的软件发布文档撰写者。请根据以下 git commit 列表，为版本 {version} 写一份面向用户的更新说明。

          Commit 列表（格式：hash 提交信息）：
          {commits}

          要求：
          1. 从用户视角出发，归纳总结这次版本带来了哪些实质性变化，而不是逐条列出 commit
          2. 合并同类项：多个相关 commit 合并成一条用户可感知的变更描述
          3. 完全忽略：构建、CI/CD、依赖升级、代码重构、格式调整、typo 修复等对用户无感知的提交
          4. 如果没有用户可感知的变更，只写一句"本次版本包含内部优化与稳定性改进"
          5. 分类使用：✨ 新功能、🐛 问题修复、⚡ 体验优化（没有某类就不写该分类）
          6. 每条描述一句话，简洁自然，无需提及 commit hash
          7. 只输出正文内容，使用 Markdown 格式
          """

          payload = {
              "model": "deepseek-chat",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
              "https://api.deepseek.com/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['DEEPSEEK_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  result = json.loads(resp.read())
                  changelog = result["choices"][0]["message"]["content"].strip()
          except Exception as e:
              changelog = f"## What's Changed\n\n{commits}\n\n> Commits: `{prev}` → `{version}`"
              print(f"Warning: DeepSeek API failed ({e}), using raw commits", file=sys.stderr)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("ai_changelog<<CHANGELOG_EOF\n")
              f.write(changelog + "\n")
              f.write("CHANGELOG_EOF\n")
          PYEOF
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          COMMITS: ${{ env.COMMITS }}
          VERSION: ${{ steps.vars.outputs.tag }}
          PREV: ${{ steps.vars.outputs.prev }}

      - name: Build release body
        id: release_body
        run: |
          VERSION="${{ steps.vars.outputs.tag }}"
          REPO="https://github.com/${{ github.repository }}"

          {
            echo "body<<EOF"
            echo "## ⬇️ 下载 (Downloads)"
            echo "- Android: [64位]($REPO/releases/download/$VERSION/bugaoshan_${VERSION}_arm64-v8a.apk)"
            echo "- Windows: [x64 Zip]($REPO/releases/download/$VERSION/bugaoshan_${VERSION}_windows_x64.zip)"
            echo "- Linux: [x64 Tar.gz]($REPO/releases/download/$VERSION/bugaoshan_${VERSION}_linux_x64.tar.gz)"
            echo ""
            echo "> 💡 **Note**: 当前项目优先保障 Android 端的稳定与体验。Windows 和 Linux 版本可能存在部分兼容性或体验问题。"
            echo ""
            echo "${{ steps.changelog.outputs.ai_changelog }}"
            echo ""
            echo "**Full diff:** $REPO/compare/${{ steps.vars.outputs.prev }}...${{ steps.vars.outputs.tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        run: |
          VERSION="${{ steps.vars.outputs.tag }}"
          for file in android-apk/*.apk; do
            filename=$(basename -- "$file")
            arch=$(echo $filename | sed 's/app-//' | sed 's/-release.apk//')
            cp "$file" "bugaoshan_${VERSION}_${arch}.apk"
          done
          cp windows-release/windows-release.zip "bugaoshan_${VERSION}_windows_x64.zip"
          cp linux-release/linux-release.tar.gz "bugaoshan_${VERSION}_linux_x64.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          body: ${{ steps.release_body.outputs.body }}
          files: |
            bugaoshan_*.apk
            bugaoshan_*.zip
            bugaoshan_*.tar.gz
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-') }}
          generate_release_notes: false
