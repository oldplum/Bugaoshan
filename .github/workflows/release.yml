name: Build App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "tag name"
        required: false
        type: string

jobs:
  build-android:
    uses: ./.github/workflows/build-android.yml
    with:
      version: ${{ github.event.inputs.version }}
    secrets: inherit

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    with:
      version: ${{ github.event.inputs.version }}
    secrets: inherit

  build-linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      version: ${{ github.event.inputs.version }}
    secrets: inherit

  release:
    name: Release
    needs: [ build-android, build-windows, build-linux ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name ==
      'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-release

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: linux-release

      - name: Set up Python 3
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Get version and tags
        id: vars
        run: python .github/scripts/release_tags.py
        env:
          VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Extract changelog
        id: changelog
        run: python .github/scripts/release_changelog.py
        env:
          VERSION: ${{ steps.vars.outputs.tag }}

      - name: Build release body
        id: release_body
        run: python .github/scripts/release_body.py
        env:
          VERSION: ${{ steps.vars.outputs.tag }}
          REPO: https://github.com/${{ github.repository }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          PREV: ${{ steps.vars.outputs.prev }}

      - name: Prepare release files
        run: python .github/scripts/release_prepare.py
        env:
          VERSION: ${{ steps.vars.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          body: ${{ steps.release_body.outputs.body }}
          files: |
            bugaoshan_*.apk
            bugaoshan_*.zip
            bugaoshan_*.tar.gz
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-') }}
          generate_release_notes: false
